<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Virtual Darshan - Samyapuram Temple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B4513;
            --secondary: #D4A574;
            --accent: #FFD700;
            --white: #FFFFFF;
            --dark: #2C2C2C;
            --light-bg: #FFF8F0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background: var(--light-bg);
            z-index: 1;
            padding-top: max(0px, env(safe-area-inset-top));
            padding-bottom: max(0px, env(safe-area-inset-bottom));
        }

        /* Top Ad Section */
        .ad-top {
            width: 100%;
            height: 60px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid var(--accent);
        }

        .ad-top img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Screen Container */
        .screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* Welcome Screen */
        #welcomeScreen {
            background: linear-gradient(180deg, rgba(139, 69, 19, 0.1) 0%, rgba(212, 165, 116, 0.1) 100%);
        }

        .welcome-image {
            max-width: 90%;
            max-height: 50%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .language-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .lang-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .lang-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        /* Camera Screen */
        #cameraScreen {
            padding: 0;
            background: #000;
            position: relative;
        }

        .camera-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .white-box {
            width: 90%;
            max-width: 400px;
            aspect-ratio: 3/4;
            border: 4px solid var(--white);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .ritual-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .gif-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--white);
            border-radius: 12px;
        }

        .video-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--dark);
            border-radius: 12px;
        }

        .image-display {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: var(--white);
            border-radius: 12px;
        }

        .flower-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
        }

        .flower {
            position: absolute;
            width: 40px;
            height: 40px;
            background-size: cover;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Ritual Controls */
        .ritual-controls {
            position: absolute;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
            padding: 0 20px;
            z-index: 20;
            flex-wrap: wrap;
        }

        .ritual-btn {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            min-width: 120px;
        }

        .ritual-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #999;
        }

        .ritual-btn.active {
            background: var(--accent);
            color: var(--dark);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .ritual-btn.blink {
            animation: blink 0.6s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Popup */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 100;
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: popupIn 0.3s ease;
        }

        @keyframes popupIn {
            from {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .popup.active {
            display: flex;
        }

        .popup-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .popup-text {
            font-size: 16px;
            color: var(--dark);
            line-height: 1.5;
        }

        .popup-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .popup-btn:active {
            transform: scale(0.95);
        }

        /* Completion Screen */
        #completionScreen {
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .completion-message {
            color: var(--white);
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
            max-width: 90%;
        }

        .completion-message h2 {
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .completion-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: var(--dark);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .completion-btn:active {
            transform: scale(0.95);
        }

        /* PDF Viewer */
        .pdf-viewer {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
        }

        .pdf-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .pdf-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pdf-btn:active {
            transform: scale(0.95);
        }

        #pdfContainer {
            flex: 1;
            background: var(--white);
            border-radius: 10px;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .pdf-content {
            font-size: 14px;
            line-height: 1.8;
            color: var(--dark);
        }

        .pdf-content h1 {
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
        }

        .pdf-content h2 {
            color: var(--secondary);
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .pdf-content p {
            margin-bottom: 10px;
            text-align: justify;
        }

        /* Bottom Ad Section */
        .ad-bottom {
            width: 100%;
            height: 60px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-top: 2px solid var(--accent);
        }

        .ad-bottom img {
            height: 100%;
            width: 100%;
            object-fit: cover;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .ritual-btn {
                padding: 10px 15px;
                font-size: 12px;
                min-width: 100px;
            }

            .popup {
                padding: 20px;
            }

            .popup-title {
                font-size: 20px;
            }

            .popup-text {
                font-size: 14px;
            }

            .completion-message h2 {
                font-size: 24px;
            }

            .completion-message {
                font-size: 16px;
            }

            .ad-top, .ad-bottom {
                height: 50px;
            }
        }

        @media (orientation: landscape) {
            .white-box {
                max-width: 300px;
                aspect-ratio: 3/4;
            }

            .ritual-controls {
                bottom: 60px;
            }
        }

        /* Status Text */
        .ritual-status {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--white);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            z-index: 20;
            font-size: 14px;
        }

        .ritual-progress {
            position: absolute;
            top: 70px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--accent);
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            z-index: 20;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Advertisement -->
        <div class="ad-top">
            <img id="adTopImage" src="" alt="Advertisement" style="display: none;">
            <div id="adTopPlaceholder" style="width: 100%; height: 100%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">Top Advertisement</div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="screen-container">
                <!-- Welcome Screen -->
                <div id="welcomeScreen" class="screen active">
                    <img id="welcomeImage" class="welcome-image" src="" alt="Welcome">
                    <h1 style="color: var(--primary); font-size: 24px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">Virtual Darshan</h1>
                    <p style="color: var(--dark); font-size: 16px;">Choose Language / மொழி தேர்ந்தெடுக்கவும்</p>
                    <div class="language-selection">
                        <button class="lang-btn" onclick="selectLanguage('english')">English</button>
                        <button class="lang-btn" onclick="selectLanguage('tamil')">தமிழ்</button>
                    </div>
                </div>

                <!-- Camera Screen -->
                <div id="cameraScreen" class="screen">
                    <div class="camera-container">
                        <video id="camera" playsinline autoplay muted></video>
                    </div>

                    <div class="ritual-status">
                        <span id="statusText">Ready for Darshan</span>
                    </div>

                    <div class="ritual-progress">
                        <span id="progressText">Sambrani → Aarthi → Camphor → Pushpa → Sarva Alankaram</span>
                    </div>

                    <div class="camera-overlay">
                        <div class="white-box">
                            <div class="ritual-content" id="ritualContent"></div>
                        </div>
                    </div>

                    <div class="ritual-controls">
                        <button class="ritual-btn" id="sambraniBtn" onclick="performRitual('sambrani')">Sambrani</button>
                        <button class="ritual-btn" id="aarthiBtn" onclick="performRitual('aarthi')" disabled>Aarthi</button>
                        <button class="ritual-btn" id="camphorBtn" onclick="performRitual('camphor')" disabled>Camphor</button>
                        <button class="ritual-btn" id="pushpaBtn" onclick="performRitual('pushpa')" disabled>Pushpa</button>
                    </div>
                </div>

                <!-- Sarva Alankaram Screen -->
                <div id="sarvaScreen" class="screen">
                    <div class="camera-container">
                        <video id="camera2" playsinline autoplay muted style="display: none;"></video>
                    </div>

                    <div class="camera-overlay">
                        <div class="white-box">
                            <div class="ritual-content" id="sarvaContent"></div>
                        </div>
                    </div>
                </div>

                <!-- Completion Screen -->
                <div id="completionScreen" class="screen">
                    <div class="completion-message">
                        <h2 id="completionTitle">Virtual Darshan Completed</h2>
                        <p id="completionText">Thank you for visiting the temple.<br>Blessings upon you!</p>
                        <button class="completion-btn" onclick="viewPDF()">View Temple Information</button>
                    </div>
                </div>

                <!-- PDF View Screen -->
                <div id="pdfScreen" class="screen">
                    <div class="pdf-viewer">
                        <div class="pdf-controls">
                            <button class="pdf-btn" onclick="downloadPDF()">Download PDF</button>
                            <button class="pdf-btn" onclick="goHome()">Visit Again</button>
                        </div>
                        <div id="pdfContainer">
                            <div class="pdf-content" id="pdfContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Advertisement -->
        <div class="ad-bottom">
            <img id="adBottomImage" src="" alt="Advertisement" style="display: none;">
            <div id="adBottomPlaceholder" style="width: 100%; height: 100%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px;">Bottom Advertisement</div>
        </div>
    </div>

    <!-- Popup -->
    <div class="popup" id="popup">
        <div class="popup-title" id="popupTitle"></div>
        <div class="popup-text" id="popupText"></div>
        <button class="popup-btn" onclick="closePopup()">Proceed</button>
    </div>

                    <h1>Samyapuram Temple</h1>
                    <h2>History</h2>
                    <p>Samyapuram Temple, located in the town of Samyapuram in the Tiruvannamalai district of Tamil Nadu, is one of the oldest and most revered temples dedicated to Lord Markandeya. The temple is believed to have been constructed during the Chola dynasty period.</p>

                    <p><strong>சர்வ அலங்கரணம்:</strong> முழுமையான அலங்கரணம் தெய்வத்தை அதன் மகிமையுடன் கொண்டாடுகிறது.</p>
                    
                    <h2>பயணிக்கும் தகவல்</h2>
                    <p>ஆலயம் ஒவ்வொரு நாளும் காலை 5:00 முதல் இரவு 9:00 வரை திறந்திருக்கிறது.</p>
                    
                    <h2>ஆசிர்வாதம்</h2>
                    <p>மார்கண்டேய பகவানின் ஆசிர்வாதம் உங்கள் மீது பொழிந்திடும். இந்த가상 தர్శన அनुభवం உங்களை ஆன்மீகமாக தெய்வனுடன் இணைக்கிறது.</p>
                `
            }
        };

        // Application State
        let currentLanguage = 'english';
        let currentRitual = 'sambrani';
        let ritualOrder = ['sambrani', 'aarthi', 'camphor', 'flowers'];
        let completedRituals = [];
        let cameraStream = null;
        let isPopupOpen = false;
        let ritualAudioIntervals = {};

        // Set user configuration
        function configureDarshan(userConfig) {
            Object.assign(config, userConfig);
            initializeAds();
            initializeWelcome();
        }

        // Initialize advertisements
        function initializeAds() {
            const adTopImg = document.getElementById('adTopImage');
            const adBottomImg = document.getElementById('adBottomImage');
            const adTopPlaceholder = document.getElementById('adTopPlaceholder');
            const adBottomPlaceholder = document.getElementById('adBottomPlaceholder');

            if (config.ads.topImageUrl) {
                adTopImg.src = config.ads.topImageUrl;
                adTopImg.style.display = 'block';
                adTopPlaceholder.style.display = 'none';
            }

            if (config.ads.bottomImageUrl) {
                adBottomImg.src = config.ads.bottomImageUrl;
                adBottomImg.style.display = 'block';
                adBottomPlaceholder.style.display = 'none';
            }
        }

        // Initialize welcome screen
        function initializeWelcome() {
            const welcomeImg = document.getElementById('welcomeImage');
            if (config.welcome.imageUrl) {
                welcomeImg.src = config.welcome.imageUrl;
            }
        }

        // Select language and start darshan
        function selectLanguage(lang) {
            currentLanguage = lang;
            updateLanguageText();
            showScreen('cameraScreen');
            initializeCamera();
        }

        // Update language text
        function updateLanguageText() {
            const statusText = document.getElementById('statusText');
            const progressText = document.getElementById('progressText');
            
            if (currentLanguage === 'tamil') {
                statusText.textContent = 'தர்శனத்திற்கு தயாரான';
                progressText.textContent = 'சம்பிரானி → ஆரத்தி → கற்பூரம் → பூக்கள் → சர்வ அலங்கரணம்';
            } else {
                statusText.textContent = 'Ready for Darshan';
                progressText.textContent = 'Sambrani → Aarthi → Camphor → Flowers → Sarva Alankaram';
            }
        }

        // Initialize camera
        function initializeCamera() {
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    cameraStream = stream;
                    const camera = document.getElementById('camera');
                    camera.srcObject = stream;
                    camera.play();
                })
                .catch(err => {
                    console.error('Camera error:', err);
                    alert(currentLanguage === 'tamil' ? 'கேமரா அணுக முடியவில்லை' : 'Unable to access camera');
                });
        }

        // Perform ritual
        function performRitual(ritual) {
            if (completedRituals.includes(ritual)) {
                return;
            }

            if (ritual !== ritualOrder[completedRituals.length]) {
                showPopup(
                    currentLanguage === 'tamil' ? 'வரிசை பிழை' : 'Order Error',
                    currentLanguage === 'tamil' 
                        ? 'தயவு செய்து வரிசையில் சடங்குகளைச் செய்யுங்கள்' 
                        : 'Please perform rituals in order',
                    true
                );
                return;
            }

            showPopup(
                currentLanguage === 'tamil' 
                    ? config.rituals[ritual].nameTam 
                    : config.rituals[ritual].nameEng,
                currentLanguage === 'tamil' 
                    ? config.rituals[ritual].descTam 
                    : config.rituals[ritual].descEng
            );
        }

        // Show popup
        function showPopup(title, text, isError = false) {
            document.getElementById('popupTitle').textContent = title;
            document.getElementById('popupText').textContent = text;
            document.getElementById('popup').classList.add('active');
            isPopupOpen = true;

            if (!isError) {
                setTimeout(() => {
                    closePopup();
                }, 3000);
            }
        }

        // Close popup and execute ritual
        function closePopup() {
            if (!isPopupOpen) return;
            document.getElementById('popup').classList.remove('active');
            isPopupOpen = false;
            executeCurrentRitual();
        }

        // Execute ritual
        function executeCurrentRitual() {
            const ritual = ritualOrder[completedRituals.length];
            completedRituals.push(ritual);
            
            updateRitualUI();
            displayRitual(ritual);
            playRitualAudio(ritual);

            if (ritual === 'flowers') {
                setTimeout(() => {
                    stopRitual();
                    showSarvaAlankaram();
                }, 5000);
            } else {
                setTimeout(() => {
                    stopRitual();
                    if (completedRituals.length < ritualOrder.length) {
                        enableNextButton();
                    }
                }, 3000);
            }
        }

        // Update ritual UI
        function updateRitualUI() {
            const buttons = {
                'sambrani': document.getElementById('sambraniBtn'),
                'aarthi': document.getElementById('aarthiBtn'),
                'camphor': document.getElementById('camphorBtn'),
                'flowers': document.getElementById('pushpaBtn')
            };

            for (let [key, btn] of Object.entries(buttons)) {
                btn.classList.remove('active', 'blink');
                if (completedRituals.includes(key)) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                }
            }

            // Enable next button with blink
            if (completedRituals.length < ritualOrder.length) {
                const nextRitual = ritualOrder[completedRituals.length];
                if (buttons[nextRitual]) {
                    buttons[nextRitual].disabled = false;
                    buttons[nextRitual].classList.add('blink');
                }
            }
        }

        // Display ritual content
        function displayRitual(ritual) {
            const content = document.getElementById('ritualContent');
            content.innerHTML = '';

            if (ritual === 'flowers') {
                displayFlowers(content);
            } else {
                const gif = document.createElement('img');
                gif.src = config.rituals[ritual].gifUrl;
                gif.className = 'gif-display';
                content.appendChild(gif);
            }
        }

        // Display falling flowers
        function displayFlowers(container) {
            const flowerContainer = document.createElement('div');
            flowerContainer.className = 'flower-container';
            container.appendChild(flowerContainer);

            const imageUrls = config.rituals.flowers.imageUrls;
            for (let i = 0; i < 30; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                const randomImage = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                flower.style.backgroundImage = `url('${randomImage}')`;
                flower.style.left = Math.random() * 100 + '%';
                flower.style.top = '-50px';
                flower.style.animationDuration = (2 + Math.random() * 3) + 's';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flowerContainer.appendChild(flower);
            }
        }

        // Play ritual audio
        function playRitualAudio(ritual) {
            const audioUrl = config.rituals[ritual].audioUrl;
            if (audioUrl) {
                const audio = new Audio(audioUrl);
                audio.play();

                // Repeat every 5 seconds
                ritualAudioIntervals[ritual] = setInterval(() => {
                    audio.currentTime = 0;
                    audio.play();
                }, 5000);
            }
        }

        // Stop ritual
        function stopRitual() {
            const ritual = completedRituals[completedRituals.length - 1];
            if (ritualAudioIntervals[ritual]) {
                clearInterval(ritualAudioIntervals[ritual]);
            }

            const content = document.getElementById('ritualContent');
            content.innerHTML = '';
        }

        // Enable next button
        function enableNextButton() {
            if (completedRituals.length < ritualOrder.length) {
                const nextRitual = ritualOrder[completedRituals.length];
                const buttons = {
                    'sambrani': document.getElementById('sambraniBtn'),
                    'aarthi': document.getElementById('aarthiBtn'),
                    'camphor': document.getElementById('camphorBtn'),
                    'flowers': document.getElementById('pushpaBtn')
                };
                if (buttons[nextRitual]) {
                    buttons[nextRitual].disabled = false;
                    buttons[nextRitual].classList.add('blink');
                }
            }
        }

        // Show Sarva Alankaram
        function showSarvaAlankaram() {
            showScreen('sarvaScreen');
            const sarvaContent = document.getElementById('sarvaContent');
            sarvaContent.innerHTML = '';

            // Play first video
            const video1 = document.createElement('video');
            video1.src = config.rituals.sarva.video1Url;
            video1.className = 'video-display';
            video1.autoplay = true;
            video1.controls = false;
            video1.muted = true;
            sarvaContent.appendChild(video1);

            // Play audio
            const audio = new Audio(config.rituals.sarva.audioUrl);
            audio.play();

            // After first video, play second video
            video1.onended = () => {
                sarvaContent.innerHTML = '';
                const video2 = document.createElement('video');
                video2.src = config.rituals.sarva.video2Url;
                video2.className = 'video-display';
                video2.autoplay = true;
                video2.controls = false;
                video2.muted = true;
                sarvaContent.appendChild(video2);

                // After second video, show completion image
                video2.onended = () => {
                    showCompletionImage();
                };
            };
        }

        // Show completion image
        function showCompletionImage() {
            const sarvaContent = document.getElementById('sarvaContent');
            sarvaContent.innerHTML = '';

            const img = document.createElement('img');
            img.src = config.completion.imageUrl;
            img.className = 'image-display';
            sarvaContent.appendChild(img);

            // Auto-download image
            downloadImage(config.completion.imageUrl, 'darshan-blessing.jpg');

            // After 3 seconds, show completion screen
            setTimeout(() => {
                showCompletionMessage();
            }, 3000);
        }

        // Download image
        function downloadImage(url, filename) {
            fetch(url)
                .then(response => response.blob())
                .then(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = filename;
                    link.click();
                })
                .catch(err => console.error('Download error:', err));
        }

        // Show completion message
        function showCompletionMessage() {
            stopCamera();
            showScreen('completionScreen');

            if (currentLanguage === 'tamil') {
                document.getElementById('completionTitle').textContent = 'தர்శனம் முடிந்தது';
                document.getElementById('completionText').innerHTML = 'கோயிலுக்கு வந்ததற்கு நன்றி.<br>உங்கள் மீது ஆசிர்வாதம் பொழிந்திடும்!';
            }
        }

        // View PDF
        function viewPDF() {
            showScreen('pdfScreen');
            const content = currentLanguage === 'tamil' 
                ? config.pdfContent.tamil 
                : config.pdfContent.english;
            document.getElementById('pdfContent').innerHTML = content;
        }

        // Download PDF
        function downloadPDF() {
            const content = currentLanguage === 'tamil' 
                ? config.pdfContent.tamil 
                : config.pdfContent.english;

            const element = document.createElement('a');
            const file = new Blob([content], {type: 'text/html'});
            element.href = URL.createObjectURL(file);
            element.download = 'temple-information.html';
            element.click();

            // Show final message
            setTimeout(() => {
                showFinalMessage();
            }, 500);
        }

        // Show final message
        function showFinalMessage() {
            const pdfContent = document.getElementById('pdfContent');
            pdfContent.innerHTML = `
                <div style="text-align: center; padding: 40px 20px;">
                    <h2 style="color: var(--primary); font-size: 24px; margin-bottom: 20px;">
                        ${currentLanguage === 'tamil' ? 'ஆன ஆரணா முடிந়தது' : 'Virtual Darshan is Over'}
                    </h2>
                    <p style="color: var(--dark); font-size: 16px; line-height: 1.6; margin-bottom: 20px;">
                        ${currentLanguage === 'tamil' 
                            ? 'கோயிலை பார்வை செய்ததற்கு நன்றி.<br>மீண்டும் வருக. பகவான் உங்கள் மீது ஆசிர்வாதம் வழங்கட்டும்!' 
                            : 'Thank you for visiting the temple.<br>Visit again. May the divine bless you!'}
                    </p>
                    <button class="pdf-btn" onclick="goHome()" style="margin-top: 30px;">
                        ${currentLanguage === 'tamil' ? 'மீண்டும் தொடங்க' : 'Start Again'}
                    </button>
                </div>
            `;
        }

        // Go home
        function goHome() {
            completedRituals = [];
            ritualAudioIntervals = {};
            showScreen('welcomeScreen');
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        }

        // Stop camera
        function stopCamera() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
        }

        // Show screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        // Initialize on load
        window.addEventListener('load', () => {
            // User should call configureDarshan() with their media URLs
            // Example:
            // configureDarshan({
            //     welcome: { imageUrl: 'path/to/welcome.jpg' },
            //     ads: { topImageUrl: 'path/to/ad-top.jpg', bottomImageUrl: 'path/to/ad-bottom.jpg' },
            //     rituals: {
            //         sambrani: { gifUrl: 'path/to/sambrani.gif', audioUrl: 'path/to/sambrani.mp3' },
            //         ...
            //     },
            //     completion: { imageUrl: 'path/to/completion.jpg' }
            // });
        });

        // Cleanup on unload
        window.addEventListener('beforeunload', () => {
            stopCamera();
            Object.values(ritualAudioIntervals).forEach(interval => clearInterval(interval));
        });

        // Handle back button on Android
        document.addEventListener('backbutton', (e) => {
            if (document.getElementById('welcomeScreen').classList.contains('active')) {
                return;
            }
            goHome();
            e.preventDefault();
        });
    </script>
</body>
</html>
